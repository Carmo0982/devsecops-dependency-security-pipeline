name: Security Scan - Dependency Check

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**/requirements.txt'
      - '**/Pipfile'
      - '**/pyproject.toml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install safety
      run: pip install safety==2.3.5
    
    - name: Find requirements files
      id: find-files
      run: |
        echo "files=$(find . \
          \( -path '*/venv' -o -path '*/venv/*' -o -path '*/.venv' -o -path '*/.venv/*' \) -prune -o \
          -name 'requirements.txt' -type f -print | tr '\n' ' ')" >> $GITHUB_OUTPUT

    - name: Prepare report folder
      run: mkdir -p security-reports
    
    - name: Scan dependencies
      run: |
        FAILED=0
        ERROR=0
        for file in ${{ steps.find-files.outputs.files }}; do
          echo "Scanning: $file"
          REPORT_NAME=$(echo "$file" | tr '/ ' '__' | tr -cd '[:alnum:]_.-')
          set +e
          python -m safety check -r "$file" --json > "security-reports/${REPORT_NAME}.json"
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -eq 1 ] || [ $EXIT_CODE -eq 64 ]; then
            FAILED=1
            echo "Vulnerabilities found in $file"
          elif [ $EXIT_CODE -ne 0 ]; then
            ERROR=1
            echo "Error scanning $file"
          fi
        done
        
        if [ $ERROR -eq 1 ]; then
          echo "::error::Falló el escaneo de dependencias"
          exit 1
        fi

        if [ $FAILED -eq 1 ]; then
          echo "::error::Se encontraron vulnerabilidades criticas"
          exit 1
        fi
        
        echo "No se encontraron vulnerabilidades"
    
    - name: Upload scan report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: security-scan-report
        path: |
          security-reports/*.json