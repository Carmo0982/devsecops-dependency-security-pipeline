pipeline {
    agent any
    
    tools {
        python 'python3'
    }
    
    stages {
        stage('Security Scan - Dependencies') {
            steps {
                script {
                    sh 'pip install safety==2.3.5'
                    sh 'mkdir -p security-reports'
                    
                    def requirementsFiles = findFiles(glob: '**/requirements.txt').findAll { file ->
                        !file.path.contains('/venv/') && !file.path.contains('/.venv/')
                    }
                    def hasVulnerabilities = false
                    def scanErrors = false
                    
                    for (file in requirementsFiles) {
                        echo "Escaneando: ${file.path}"
                        def reportName = file.path.replaceAll(/[\\/]/, '_').replaceAll(/[^A-Za-z0-9_.-]/, '_') + '.json'
                        def scanResult = sh(
                            script: "set +e; python -m safety check -r '${file.path}' --json > 'security-reports/${reportName}'; exit $?",
                            returnStatus: true
                        )

                        if (scanResult == 1 || scanResult == 64) {
                            hasVulnerabilities = true
                            echo "Vulnerabilidades encontradas en ${file.path}"
                        } else if (scanResult != 0) {
                            scanErrors = true
                            echo "Error ejecutando safety en ${file.path}"
                        }
                    }
                    
                    if (scanErrors) {
                        error("Falló el escaneo de dependencias. Revisar reportes generados.")
                    }

                    if (hasVulnerabilities) {
                        error("Se encontraron vulnerabilidades en las dependencias. Pipeline detenido.")
                    }
                    
                    echo "No se encontraron vulnerabilidades"
                }
            }
        }
        
        stage('Build') {
            steps {
                echo 'Construyendo aplicacion...'
            }
        }
        
        stage('Deploy') {
            steps {
                echo 'Desplegando a produccion...'
            }
        }
    }
    
    post {
        failure {
            echo 'Pipeline fallo por vulnerabilidades en dependencias'
        }
        success {
            echo 'Pipeline exitoso - Sin vulnerabilidades criticas'
        }
        always {
            archiveArtifacts artifacts: 'security-reports/*.json', allowEmptyArchive: true
        }
    }
}