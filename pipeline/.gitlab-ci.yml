stages:
  - security-scan
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

security-scan:
  stage: security-scan
  image: python:3.12-slim
  before_script:
    - pip install safety==2.3.5
  script:
    - echo "Escaneando dependencias..."
    - |
      FAILED=0
      for file in $(find . -name "requirements.txt" -type f); do
        echo "Escaneando: $file"
        python -m safety check -r "$file" --json || FAILED=1
      done
      
      if [ $FAILED -eq 1 ]; then
        echo "Se encontraron vulnerabilidades"
        exit 1
      fi
      
      echo "No se encontraron vulnerabilidades"
  artifacts:
    reports:
      dependency_scanning: gl-dependency-scanning-report.json
    expire_in: 7 days
  only:
    - main
    - develop
    - merge_requests

build:
  stage: build
  script:
    - echo "Construyendo aplicacion..."
  only:
    - main

deploy:
  stage: deploy
  script:
    - echo "Desplegando a produccion..."
  only:
    - main
  when: manual