stages:
  - security-scan
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

security-scan:
  stage: security-scan
  image: python:3.12-slim
  before_script:
    - pip install safety==2.3.5
    - mkdir -p security-reports
  script:
    - echo "Escaneando dependencias..."
    - |
      FAILED=0
      ERROR=0
      for file in $(find . \( -path "*/venv" -o -path "*/venv/*" -o -path "*/.venv" -o -path "*/.venv/*" \) -prune -o -name "requirements.txt" -type f -print); do
        echo "Escaneando: $file"
        REPORT_NAME=$(echo "$file" | tr '/ ' '__' | tr -cd '[:alnum:]_.-')
        set +e
        python -m safety check -r "$file" --json > "security-reports/${REPORT_NAME}.json"
        EXIT_CODE=$?
        set -e

        if [ $EXIT_CODE -eq 1 ] || [ $EXIT_CODE -eq 64 ]; then
          FAILED=1
        elif [ $EXIT_CODE -ne 0 ]; then
          ERROR=1
        fi
      done

      if [ $ERROR -eq 1 ]; then
        echo "Error durante el escaneo de dependencias"
        exit 1
      fi
      
      if [ $FAILED -eq 1 ]; then
        echo "Se encontraron vulnerabilidades"
        exit 1
      fi
      
      echo "No se encontraron vulnerabilidades"
  artifacts:
    paths:
      - security-reports/*.json
    expire_in: 7 days
  only:
    - main
    - develop
    - merge_requests

build:
  stage: build
  script:
    - echo "Construyendo aplicacion..."
  only:
    - main

deploy:
  stage: deploy
  script:
    - echo "Desplegando a produccion..."
  only:
    - main
  when: manual